<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Culebrita</title>
<style>
  :root{
    --lcd-bg: #9bad86;
    --lcd-bg-2: #8fa27a;
    --lcd-dark: #2b3423;
    --lcd-dark-soft: #445039;
    --shell: #34322f;
    --shell-2: #45423d;
    --shell-hi: #58554e;
    --btn: #262521;
    --accent: #b34c3c;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; height:100%;
    background: radial-gradient(circle at 50% -10%, #4a4844, #1c1b19 70%);
    font-family: 'Courier New', monospace;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .phone{
    width: min(94vw, 400px);
    background: linear-gradient(160deg, var(--shell-2), var(--shell) 60%, #29281f);
    border-radius: 34px;
    padding: 22px 20px 26px;
    box-shadow:
      0 30px 60px rgba(0,0,0,0.55),
      inset 0 2px 2px rgba(255,255,255,0.08),
      inset 0 -6px 10px rgba(0,0,0,0.5);
    position: relative;
  }
  .phone::before{
    content:"NOKLA 3310";
    display:block;
    text-align:center;
    font-size: 11px;
    letter-spacing: 3px;
    color: #8a8778;
    font-weight: bold;
    margin-bottom: 10px;
    text-shadow: 0 1px 0 rgba(0,0,0,0.6);
  }
  .earpiece{
    width: 50px; height: 6px;
    background: #1c1b19;
    border-radius: 4px;
    margin: 0 auto 14px;
    box-shadow: inset 0 1px 2px rgba(0,0,0,0.8);
  }
  .screen-frame{
    background: linear-gradient(145deg, #17170f, #0e0e0a);
    border-radius: 10px;
    padding: 14px 12px;
    box-shadow: inset 0 3px 10px rgba(0,0,0,0.9), inset 0 0 0 2px #050503;
  }
  .screen-topbar{
    display:flex;
    justify-content: space-between;
    align-items:center;
    padding: 0 2px 6px;
    font-size: 10px;
    letter-spacing: 1px;
    color: var(--lcd-dark);
    font-weight: bold;
  }
  .lcd{
    background: linear-gradient(155deg, var(--lcd-bg), var(--lcd-bg-2));
    border-radius: 3px;
    position: relative;
    box-shadow: inset 0 0 12px rgba(0,0,0,0.25);
    overflow: hidden;
  }
  canvas{
    display:block;
    width:100%;
    height:100%;
    image-rendering: pixelated;
  }
  .scanlines{
    position:absolute; inset:0;
    background: repeating-linear-gradient(
      to bottom,
      rgba(0,0,0,0.06) 0px,
      rgba(0,0,0,0.06) 1px,
      transparent 1px,
      transparent 3px
    );
    pointer-events:none;
    mix-blend-mode: multiply;
  }
  .overlay{
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    color: var(--lcd-dark);
    text-align:center;
    background: rgba(155,173,134,0.0);
    opacity:0;
    pointer-events:none;
    transition: opacity .15s;
  }
  .overlay.show{ opacity:1; pointer-events:auto; }
  .overlay h1{
    font-size: 15px;
    letter-spacing: 2px;
    margin: 0 0 6px;
    font-weight: bold;
  }
  .overlay p{
    font-size: 11px;
    margin: 2px 0;
    letter-spacing: 1px;
  }
  .overlay .hint{
    margin-top: 10px;
    font-size: 10px;
    opacity: 0.8;
    animation: blink 1.1s steps(1) infinite;
  }
  @keyframes blink{ 50%{ opacity: 0.15; } }

  .status-row{
    display:flex; justify-content:space-between;
    padding: 8px 4px 0;
    font-size: 10px;
    color: #8a8778;
    letter-spacing: 1px;
  }

  .dpad-area{
    margin-top: 18px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding: 0 6px;
  }
  .softkeys{
    display:flex; justify-content:space-between; width: 100%;
    font-size: 10px; color:#9c988a; letter-spacing:1px;
    padding: 0 2px 6px;
  }
  .dpad{
    position: relative;
    width: 108px; height: 108px;
    margin: 0 auto;
  }
  .dpad button{
    position:absolute;
    background: linear-gradient(160deg, var(--btn), #1a1916);
    border: none;
    color: #c9c6ba;
    font-size: 13px;
    box-shadow: 0 3px 0 #111008, inset 0 1px 1px rgba(255,255,255,0.08);
    cursor: pointer;
    display:flex; align-items:center; justify-content:center;
    user-select:none;
    -webkit-user-select:none;
  }
  .dpad button:active{
    transform: translateY(2px);
    box-shadow: 0 1px 0 #111008, inset 0 1px 1px rgba(255,255,255,0.08);
  }
  .dpad .up{ top:0; left:38px; width:32px; height:32px; border-radius:8px 8px 3px 3px;}
  .dpad .down{ bottom:0; left:38px; width:32px; height:32px; border-radius:3px 3px 8px 8px;}
  .dpad .left{ left:0; top:38px; width:32px; height:32px; border-radius:8px 3px 3px 8px;}
  .dpad .right{ right:0; top:38px; width:32px; height:32px; border-radius:3px 8px 8px 3px;}
  .dpad .center{
    top:38px; left:38px; width:32px; height:32px; border-radius:6px;
    background: linear-gradient(160deg, #2f2d28, #1a1916);
    font-size: 9px; color:#a2a08f; letter-spacing:0.5px;
  }

  .brand-row{
    text-align:center;
    margin-top: 16px;
    font-size: 9px;
    color: #706d62;
    letter-spacing: 3px;
  }
</style>
</head>
<body>

<div class="phone">
  <div class="earpiece"></div>
  <div class="screen-frame">
    <div class="screen-topbar">
      <span id="topLevel">NIVEL 1</span>
      <span id="topScore">000</span>
    </div>
    <div class="lcd" id="lcdWrap">
      <canvas id="game" width="128" height="128"></canvas>
      <div class="scanlines"></div>
      <div class="overlay show" id="overlay">
        <h1>CULEBRITA</h1>
        <p>Toca una direccion</p>
        <p>para empezar</p>
        <p class="hint">▷ PULSA PARA JUGAR</p>
      </div>
    </div>
    <div class="status-row">
      <span>RECORD: <span id="hiscore">0</span></span>
      <span id="statusRight">LISTO</span>
    </div>
  </div>

  <div class="softkeys">
    <span>Menu</span>
    <span>Nombres</span>
  </div>

  <div class="dpad-area">
    <div class="dpad">
      <button class="up" data-dir="up">▲</button>
      <button class="left" data-dir="left">◀</button>
      <button class="center" id="pauseBtn">▶ ll</button>
      <button class="right" data-dir="right">▶</button>
      <button class="down" data-dir="down">▼</button>
    </div>
  </div>

  <div class="brand-row">CULEBRITA · 1997</div>
</div>

<script>
(function(){
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const GRID = 16; // 16x16 cells on a 128x128 canvas -> 8px per cell
  const CELL = canvas.width / GRID;

  const overlay = document.getElementById('overlay');
  const topScore = document.getElementById('topScore');
  const topLevel = document.getElementById('topLevel');
  const hiscoreEl = document.getElementById('hiscore');
  const statusRight = document.getElementById('statusRight');
  const pauseBtn = document.getElementById('pauseBtn');

  const DARK = '#2b3423';

  let snake, dir, nextDir, food, score, hiscore, speed, timer, running, gameOver, paused, level;

  hiscore = parseInt(localStorage.getItem('culebrita_hiscore') || '0', 10);
  hiscoreEl.textContent = hiscore;

  function reset(){
    snake = [
      {x:7,y:8},{x:6,y:8},{x:5,y:8}
    ];
    dir = {x:1,y:0};
    nextDir = {x:1,y:0};
    score = 0;
    level = 1;
    speed = 150;
    running = false;
    gameOver = false;
    paused = false;
    placeFood();
    updateHUD();
    draw();
  }

  function placeFood(){
    let valid = false;
    while(!valid){
      food = { x: Math.floor(Math.random()*GRID), y: Math.floor(Math.random()*GRID) };
      valid = !snake.some(s => s.x === food.x && s.y === food.y);
    }
  }

  function updateHUD(){
    topScore.textContent = String(score).padStart(3,'0');
    topLevel.textContent = 'NIVEL ' + level;
    statusRight.textContent = paused ? 'PAUSA' : (gameOver ? 'FIN' : (running ? 'JUEGO' : 'LISTO'));
  }

  function drawCell(x,y, filled){
    const px = x*CELL, py = y*CELL;
    if(filled){
      ctx.fillStyle = DARK;
      ctx.fillRect(px+1, py+1, CELL-2, CELL-2);
    }
  }

  function draw(){
    ctx.fillStyle = 'transparent';
    ctx.clearRect(0,0,canvas.width, canvas.height);

    // grid dots (subtle, LCD segment look)
    ctx.fillStyle = 'rgba(43,52,35,0.08)';
    for(let x=0;x<GRID;x++){
      for(let y=0;y<GRID;y++){
        ctx.fillRect(x*CELL, y*CELL, CELL-1, CELL-1);
      }
    }

    // food (blinking dot)
    drawCell(food.x, food.y, true);

    // snake
    snake.forEach((s, i) => drawCell(s.x, s.y, true));
  }

  function step(){
    if(paused || gameOver) return;
    dir = nextDir;
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    // wrap around edges, classic Nokia style
    if(head.x < 0) head.x = GRID-1;
    if(head.x >= GRID) head.x = 0;
    if(head.y < 0) head.y = GRID-1;
    if(head.y >= GRID) head.y = 0;

    // self collision
    if(snake.some(s => s.x === head.x && s.y === head.y)){
      endGame();
      return;
    }

    snake.unshift(head);

    if(head.x === food.x && head.y === food.y){
      score += 10;
      if(score % 50 === 0 && speed > 60){
        speed -= 10;
        level += 1;
        restartTimer();
      }
      placeFood();
    } else {
      snake.pop();
    }

    updateHUD();
    draw();
  }

  function restartTimer(){
    clearInterval(timer);
    timer = setInterval(step, speed);
  }

  function endGame(){
    gameOver = true;
    running = false;
    clearInterval(timer);
    if(score > hiscore){
      hiscore = score;
      localStorage.setItem('culebrita_hiscore', String(hiscore));
      hiscoreEl.textContent = hiscore;
    }
    updateHUD();
    overlay.innerHTML =
      '<h1>FIN DEL JUEGO</h1>' +
      '<p>PUNTOS: ' + score + '</p>' +
      '<p>RECORD: ' + hiscore + '</p>' +
      '<p class="hint">▷ PULSA PARA REINICIAR</p>';
    overlay.classList.add('show');
  }

  function startGame(){
    if(gameOver){
      reset();
    }
    if(!running){
      running = true;
      paused = false;
      overlay.classList.remove('show');
      restartTimer();
      updateHUD();
    }
  }

  function togglePause(){
    if(!running || gameOver) { startGame(); return; }
    paused = !paused;
    updateHUD();
    if(paused){
      clearInterval(timer);
      overlay.innerHTML = '<h1>PAUSA</h1><p class="hint">▷ PULSA PARA SEGUIR</p>';
      overlay.classList.add('show');
    } else {
      overlay.classList.remove('show');
      restartTimer();
    }
  }

  function setDir(nx, ny){
    // prevent reversing directly into itself
    if(snake.length > 1 && nx === -dir.x && ny === -dir.y) return;
    nextDir = {x:nx, y:ny};
    if(paused){ togglePause(); }
    else { startGame(); }
  }

  document.querySelectorAll('.dpad button[data-dir]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.preventDefault();
      const d = btn.dataset.dir;
      if(d === 'up') setDir(0,-1);
      if(d === 'down') setDir(0,1);
      if(d === 'left') setDir(-1,0);
      if(d === 'right') setDir(1,0);
    });
  });

  pauseBtn.addEventListener('click', (e) => {
    e.preventDefault();
    togglePause();
  });

  overlay.addEventListener('click', () => {
    if(gameOver){ reset(); startGame(); }
    else if(paused){ togglePause(); }
    else { startGame(); }
  });

  document.addEventListener('keydown', (e) => {
    switch(e.key){
      case 'ArrowUp': case 'w': case 'W': setDir(0,-1); e.preventDefault(); break;
      case 'ArrowDown': case 's': case 'S': setDir(0,1); e.preventDefault(); break;
      case 'ArrowLeft': case 'a': case 'A': setDir(-1,0); e.preventDefault(); break;
      case 'ArrowRight': case 'd': case 'D': setDir(1,0); e.preventDefault(); break;
      case ' ': togglePause(); e.preventDefault(); break;
    }
  });

  // basic swipe support on the screen itself
  let touchStart = null;
  const lcdWrap = document.getElementById('lcdWrap');
  lcdWrap.addEventListener('touchstart', (e) => {
    const t = e.changedTouches[0];
    touchStart = {x:t.clientX, y:t.clientY};
  }, {passive:true});
  lcdWrap.addEventListener('touchend', (e) => {
    if(!touchStart) return;
    const t = e.changedTouches[0];
    const dx = t.clientX - touchStart.x;
    const dy = t.clientY - touchStart.y;
    if(Math.abs(dx) < 20 && Math.abs(dy) < 20){ touchStart = null; return; }
    if(Math.abs(dx) > Math.abs(dy)){
      setDir(dx > 0 ? 1 : -1, 0);
    } else {
      setDir(0, dy > 0 ? 1 : -1);
    }
    touchStart = null;
  }, {passive:true});

  reset();
})();
</script>

</body>
</html>
